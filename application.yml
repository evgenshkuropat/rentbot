spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

rentbot:
  notifications:
    max-per-user-per-cycle: ${RENTBOT_NOTIFICATIONS_MAX_PER_USER_PER_CYCLE:5}
  bazos:
    max-requests-per-cycle: ${RENTBOT_BAZOS_MAX_REQUESTS_PER_CYCLE:24}
    request-delay-ms: ${RENTBOT_BAZOS_REQUEST_DELAY_MS:500}
    rate-limit-cooldown-ms: ${RENTBOT_BAZOS_RATE_LIMIT_COOLDOWN_MS:900000}
